name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel an in-flight CI run when a new commit lands on the same ref.
# `github.ref` covers both branches (push) and pull request refs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      # Verifies the bundle still builds clean from src/. The committed
      # dist/camera-gallery-card.js is *not* required to be in sync with src/
      # on PR branches — sync-bundle.yml handles that automatically after each
      # push to main, and release.yml handles it on the release PR's branch.
      - name: Build
        run: npm run build
